name: Build Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build Windows installer
        working-directory: app
        run: npm run build

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: wishpertype-windows-x64
          path: |
            app/src-tauri/target/release/bundle/nsis/*.exe
            app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Copy into releases/windows
        shell: bash
        run: |
          mkdir -p releases/windows
          cp app/src-tauri/target/release/bundle/nsis/*.exe releases/windows/ || true
          cp app/src-tauri/target/release/bundle/msi/*.msi releases/windows/ || true
          ls -la releases/windows

      - name: Upload releases/windows folder
        uses: actions/upload-artifact@v4
        with:
          name: releases-windows
          path: releases/windows/
