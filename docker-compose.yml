services:
  wishpertype-backend:
    build:
      context: ./backend/nestjs
      dockerfile: Dockerfile
    container_name: wishpertype-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3003}:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - HOST=0.0.0.0
      - API_KEY=${API_KEY:-}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DATABASE_PATH=/app/data/wishpertype.db
      - DATABASE_URL=file:/app/data/wishpertype.db
      - WHISPER_MODEL=${WHISPER_MODEL:-base.en}
      - WHISPER_MODEL_PATH=/app/models
      - WHISPER_THREADS=${WHISPER_THREADS:-4}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-en}
      - WHISPER_SERVER_ENABLED=${WHISPER_SERVER_ENABLED:-true}
      - WHISPER_STREAM_CHUNK_SEC=${WHISPER_STREAM_CHUNK_SEC:-5}
      - WHISPER_STREAM_OVERLAP_SEC=${WHISPER_STREAM_OVERLAP_SEC:-1}
      - CORS_ORIGIN=${CORS_ORIGIN:-tauri://localhost,http://tauri.localhost,http://localhost:1420,http://localhost:3003}
      - MAX_UPLOAD_BYTES=${MAX_UPLOAD_BYTES:-26214400}
      - TRANSCRIBE_TIMEOUT_MS=${TRANSCRIBE_TIMEOUT_MS:-300000}
    volumes:
      - whisper_models:/app/models
      - whisper_tmp:/app/tmp
      - whisper_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  whisper_models:
  whisper_tmp:
  whisper_data:
