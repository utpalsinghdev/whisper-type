<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WishperType — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dashboard/static/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <div class="brand-row">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-name">WishperType</span>
        </div>
        <h1>Transcription dashboard</h1>
        <p class="who" id="who">Loading…</p>
      </div>
      <button class="btn btn-ghost" type="button" id="logout">Log out</button>
    </header>

    <section class="api-key-bar" aria-label="API key">
      <div class="api-key-copy">
        <div class="label">API key</div>
        <p class="hint">Use this in the WishperType desktop app (Settings → Backend). Rebuilds don’t change it unless you edit <code>API_KEY</code> in <code>.env</code>.</p>
      </div>
      <div class="api-key-actions">
        <code class="api-key-value" id="apiKeyValue" title="">—</code>
        <button class="btn btn-ghost" type="button" id="copyApiKey" disabled>Copy</button>
      </div>
    </section>

    <section class="metrics" aria-label="Totals">
      <div class="metric">
        <div class="label">Audio processed</div>
        <div class="value is-accent" id="audioTotal">—</div>
      </div>
      <div class="metric">
        <div class="label">Words generated</div>
        <div class="value" id="wordsTotal">—</div>
      </div>
      <div class="metric">
        <div class="label">Sessions</div>
        <div class="value" id="sessionsTotal">—</div>
      </div>
    </section>

    <section class="panel" aria-labelledby="log-title">
      <div class="panel-head">
        <h2 id="log-title">Session log</h2>
        <span class="count" id="logCount"></span>
      </div>
      <div id="log" class="session-list" aria-live="polite">
        <div class="skeleton" aria-hidden="true">
          <div class="skel-line w40"></div>
          <div class="skel-line w80"></div>
          <div class="skel-line w60"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    async function api(path, opts) {
      const res = await fetch(path, { credentials: 'same-origin', ...opts });
      if (res.status === 401) {
        window.location.href = '/dashboard/login';
        throw new Error('unauthorized');
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || 'Request failed');
      return data;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function formatWhen(iso) {
      try {
        const normalized = iso.includes('T') ? iso : iso.replace(' ', 'T');
        const withZ = /Z$|[+-]\d{2}:?\d{2}$/.test(normalized) ? normalized : normalized + 'Z';
        return new Date(withZ).toLocaleString(undefined, {
          dateStyle: 'medium',
          timeStyle: 'short',
        });
      } catch {
        return iso;
      }
    }

    function maskKey(key) {
      if (!key) return 'Not set';
      if (key.length <= 12) return '••••••••';
      return `${key.slice(0, 8)}…${key.slice(-6)}`;
    }

    async function load() {
      const me = await api('/dashboard/api/me');
      document.getElementById('who').innerHTML =
        `Signed in as <strong>${esc(me.user.email)}</strong>`;

      const keyEl = document.getElementById('apiKeyValue');
      const copyBtn = document.getElementById('copyApiKey');
      window.__apiKey = me.apiKey || '';
      keyEl.textContent = maskKey(window.__apiKey);
      keyEl.title = me.apiKeyConfigured ? 'Hidden — use Copy' : 'API_KEY is empty on the server';
      copyBtn.disabled = !me.apiKeyConfigured;

      const stats = await api('/dashboard/api/stats');
      document.getElementById('audioTotal').textContent = stats.totalAudioLabel;
      document.getElementById('wordsTotal').textContent = stats.totalWords.toLocaleString();
      document.getElementById('sessionsTotal').textContent = stats.totalSessions.toLocaleString();

      const { sessions } = await api('/dashboard/api/sessions?limit=100');
      const log = document.getElementById('log');
      document.getElementById('logCount').textContent =
        sessions.length ? `${sessions.length} recent` : '';

      if (!sessions.length) {
        log.innerHTML = `
          <div class="empty">
            <h3>No sessions yet</h3>
            <p>Point the WishperType app at this backend and dictate once. Each transcription will show here with duration and the full text.</p>
          </div>`;
        return;
      }

      log.innerHTML = sessions.map((s) => `
        <article class="session">
          <div class="session-meta">
            <span class="dur">${esc(s.durationLabel)}</span>
            <span>${esc(formatWhen(s.createdAt))}</span>
            <span>${s.wordCount} words</span>
            ${s.model ? `<span class="pill">${esc(s.model)}</span>` : ''}
          </div>
          <div class="session-text">${esc(s.text || '(empty)')}</div>
        </article>
      `).join('');
    }

    document.getElementById('copyApiKey').addEventListener('click', async () => {
      const key = window.__apiKey || '';
      const btn = document.getElementById('copyApiKey');
      if (!key) return;
      try {
        await navigator.clipboard.writeText(key);
        btn.textContent = 'Copied';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1600);
      } catch {
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1600);
      }
    });

    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/dashboard/api/logout', { method: 'POST', credentials: 'same-origin' });
      window.location.href = '/dashboard/login';
    });

    load().catch((err) => {
      if (err.message !== 'unauthorized') {
        document.getElementById('who').textContent = 'Failed to load dashboard';
        document.getElementById('log').innerHTML =
          '<div class="empty"><h3>Couldn’t load sessions</h3><p>Refresh the page, or check that the backend is still running.</p></div>';
      }
    });
  </script>
</body>
</html>
