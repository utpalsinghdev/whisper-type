<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141225"/>
      <stop offset="1" stop-color="#0b0a14"/>
    </linearGradient>
    <linearGradient id="mic" x1="360" y1="210" x2="664" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b06cff"/>
      <stop offset="1" stop-color="#4f7bff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b06cff"/>
      <stop offset="1" stop-color="#4f7bff"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="72" y="72" width="880" height="880" rx="220" fill="url(#bg)"/>
  <rect x="72.5" y="72.5" width="879" height="879" rx="219.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Left sound waves -->
  <g stroke="url(#accent)" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M300 420 A 120 120 0 0 0 300 604" stroke-width="26"/>
    <path d="M232 388 A 176 176 0 0 0 232 636" stroke-width="26" opacity="0.55"/>
  </g>
  <!-- Right sound waves -->
  <g stroke="url(#accent)" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M724 420 A 120 120 0 0 1 724 604" stroke-width="26"/>
    <path d="M792 388 A 176 176 0 0 1 792 636" stroke-width="26" opacity="0.55"/>
  </g>

  <!-- Mic holder arc -->
  <path d="M366 452 V 512 A 146 146 0 0 0 658 512 V 452" stroke="url(#mic)" stroke-width="30" stroke-linecap="round" fill="none"/>
  <!-- Mic stem + base -->
  <rect x="497" y="656" width="30" height="86" rx="15" fill="url(#mic)"/>
  <rect x="440" y="742" width="144" height="30" rx="15" fill="url(#mic)"/>

  <!-- Mic body -->
  <rect x="424" y="250" width="176" height="356" rx="88" fill="url(#mic)"/>

  <!-- Voice bars inside mic -->
  <g fill="#ffffff" opacity="0.92">
    <rect x="462" y="382" width="16" height="92" rx="8"/>
    <rect x="496" y="344" width="16" height="168" rx="8"/>
    <rect x="530" y="366" width="16" height="124" rx="8"/>
    <rect x="564" y="398" width="16" height="60" rx="8"/>
  </g>
</svg>
